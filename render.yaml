services:
  - type: web
    name: telegram-downloader-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: ADMIN_IDS
        sync: false
      # Netscape-format cookies after logging into youtube.com (Secret File path on Render).
      # See README "YouTube on cloud hosting".
      - key: YTDLP_COOKIEFILE
        sync: false
